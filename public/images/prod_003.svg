<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <linearGradient id="bat3" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="batScreen3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <ellipse cx="200" cy="350" rx="110" ry="16" fill="#000000" opacity="0.3"/>
  <!-- Battery cabinet -->
  <g filter="url(#shadow3)">
    <rect x="115" y="70" width="170" height="240" rx="14" fill="url(#bat3)" stroke="#94a3b8" stroke-width="2"/>
    <rect x="115" y="70" width="170" height="22" rx="14" fill="#ffffff" opacity="0.15"/>
    <!-- Inner display -->
    <rect x="135" y="100" width="130" height="160" rx="8" fill="url(#batScreen3)" stroke="#334155" stroke-width="2"/>
    <!-- Battery cells visualization -->
    <g fill="#1e293b">
      <rect x="150" y="115" width="44" height="65" rx="4"/>
      <rect x="206" y="115" width="44" height="65" rx="4"/>
      <rect x="150" y="190" width="44" height="55" rx="4"/>
      <rect x="206" y="190" width="44" height="55" rx="4"/>
    </g>
    <g fill="#334155" opacity="0.5">
      <rect x="156" y="122" width="32" height="3"/>
      <rect x="156" y="132" width="32" height="3"/>
      <rect x="212" y="122" width="32" height="3"/>
      <rect x="212" y="132" width="32" height="3"/>
    </g>
    <!-- LED bar -->
    <circle cx="150" cy="282" r="5" fill="#10b981"/>
    <circle cx="170" cy="282" r="5" fill="#10b981"/>
    <circle cx="190" cy="282" r="5" fill="#f97316"/>
    <circle cx="210" cy="282" r="5" fill="#334155"/>
    <!-- Brand -->
    <text x="200" y="305" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="bold">QuantumCore</text>
  </g>
  <text x="200" y="375" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">10кВт·ч LiFePO4</text>
</svg>
