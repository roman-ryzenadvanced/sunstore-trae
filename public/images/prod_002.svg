<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <linearGradient id="inv2" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="screen2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <ellipse cx="200" cy="345" rx="120" ry="18" fill="#000000" opacity="0.3"/>
  <!-- Inverter body -->
  <g filter="url(#shadow2)">
    <rect x="95" y="90" width="210" height="210" rx="14" fill="url(#inv2)" stroke="#475569" stroke-width="2"/>
    <!-- Top bezel highlight -->
    <rect x="95" y="90" width="210" height="20" rx="14" fill="#ffffff" opacity="0.1"/>
    <!-- Display -->
    <rect x="118" y="120" width="164" height="86" rx="8" fill="url(#screen2)" stroke="#1e293b" stroke-width="2"/>
    <text x="200" y="158" font-family="monospace" font-size="22" fill="#10b981" text-anchor="middle" font-weight="bold">5.0 kW</text>
    <text x="200" y="184" font-family="monospace" font-size="13" fill="#f97316" text-anchor="middle">230V 50Hz</text>
    <!-- Ventilation grilles -->
    <g stroke="#64748b" stroke-width="3" opacity="0.6">
      <line x1="118" y1="228" x2="282" y2="228"/>
      <line x1="118" y1="242" x2="282" y2="242"/>
      <line x1="118" y1="256" x2="282" y2="256"/>
      <line x1="118" y1="270" x2="282" y2="270"/>
    </g>
    <!-- Status LEDs -->
    <circle cx="125" cy="292" r="5" fill="#10b981"/>
    <circle cx="142" cy="292" r="5" fill="#f97316"/>
  </g>
  <text x="200" y="378" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">VortexX 5кВт Инвертор</text>
</svg>
