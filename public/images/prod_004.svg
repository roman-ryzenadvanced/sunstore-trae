<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <linearGradient id="rail4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg4)"/>
  <ellipse cx="200" cy="330" rx="130" ry="16" fill="#000000" opacity="0.3"/>
  <!-- Mounting rail -->
  <g filter="url(#shadow4)">
    <rect x="50" y="140" width="300" height="44" rx="10" fill="url(#rail4)" stroke="#64748b" stroke-width="2"/>
    <rect x="50" y="148" width="300" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
    <!-- Clamps -->
    <rect x="95" y="108" width="34" height="56" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="1"/>
    <rect x="271" y="108" width="34" height="56" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="1"/>
    <!-- Clamp bolts -->
    <circle cx="112" cy="136" r="9" fill="#475569" stroke="#334155" stroke-width="2"/>
    <circle cx="288" cy="136" r="9" fill="#475569" stroke="#334155" stroke-width="2"/>
    <!-- Rail mounting holes -->
    <circle cx="120" cy="162" r="3" fill="#64748b"/>
    <circle cx="160" cy="162" r="3" fill="#64748b"/>
    <circle cx="200" cy="162" r="3" fill="#64748b"/>
    <circle cx="240" cy="162" r="3" fill="#64748b"/>
    <circle cx="280" cy="162" r="3" fill="#64748b"/>
  </g>
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#e2e8f0" text-anchor="middle">TitanMount</text>
  <text x="200" y="325" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Крепление на крышу</text>
</svg>
