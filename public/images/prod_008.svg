<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <linearGradient id="inv8" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="invScreen8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow8">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg8)"/>
  <ellipse cx="200" cy="345" rx="125" ry="16" fill="#000000" opacity="0.3"/>
  <!-- Large 3-phase inverter -->
  <g filter="url(#shadow8)">
    <rect x="65" y="80" width="270" height="205" rx="14" fill="url(#inv8)" stroke="#475569" stroke-width="2"/>
    <rect x="65" y="80" width="270" height="20" rx="14" fill="#ffffff" opacity="0.1"/>
    <!-- Dual display -->
    <rect x="88" y="110" width="224" height="78" rx="8" fill="url(#invScreen8)" stroke="#334155" stroke-width="2"/>
    <text x="200" y="148" font-family="monospace" font-size="20" fill="#10b981" text-anchor="middle" font-weight="bold">10.0 kW</text>
    <text x="200" y="174" font-family="monospace" font-size="12" fill="#f97316" text-anchor="middle">3-PHASE 400V</text>
    <!-- Phase indicator lights -->
    <circle cx="108" cy="210" r="6" fill="#10b981"/>
    <circle cx="200" cy="210" r="6" fill="#10b981"/>
    <circle cx="292" cy="210" r="6" fill="#10b981"/>
    <!-- Heavy duty cable connectors -->
    <rect x="100" y="240" width="18" height="38" rx="4" fill="#1f2937"/>
    <rect x="155" y="240" width="18" height="38" rx="4" fill="#1f2937"/>
    <rect x="227" y="240" width="18" height="38" rx="4" fill="#1f2937"/>
    <rect x="282" y="240" width="18" height="38" rx="4" fill="#1f2937"/>
  </g>
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">VortexX 10кВт 3-фазный</text>
</svg>
