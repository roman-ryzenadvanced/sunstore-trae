<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <linearGradient id="panel1" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="50%" stop-color="#0d2238"/>
      <stop offset="100%" stop-color="#081626"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="frame1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <!-- Reflection floor -->
  <ellipse cx="200" cy="350" rx="140" ry="20" fill="#000000" opacity="0.3"/>
  <!-- Panel with perspective -->
  <g transform="translate(200,190) rotate(-12) scale(1,0.92)" filter="url(#shadow1)">
    <rect x="-150" y="-100" width="300" height="200" rx="8" fill="url(#panel1)" stroke="url(#frame1)" stroke-width="6"/>
    <!-- Cell grid -->
    <g stroke="#f97316" stroke-width="1.2" opacity="0.45">
      <line x1="-112" y1="-100" x2="-112" y2="100"/>
      <line x1="-75" y1="-100" x2="-75" y2="100"/>
      <line x1="-37" y1="-100" x2="-37" y2="100"/>
      <line x1="0" y1="-100" x2="0" y2="100"/>
      <line x1="37" y1="-100" x2="37" y2="100"/>
      <line x1="75" y1="-100" x2="75" y2="100"/>
      <line x1="112" y1="-100" x2="112" y2="100"/>
      <line x1="-150" y1="-66" x2="150" y2="-66"/>
      <line x1="-150" y1="-33" x2="150" y2="-33"/>
      <line x1="-150" y1="0" x2="150" y2="0"/>
      <line x1="-150" y1="33" x2="150" y2="33"/>
      <line x1="-150" y1="66" x2="150" y2="66"/>
    </g>
    <!-- Busbars -->
    <g stroke="#cbd5e1" stroke-width="0.8" opacity="0.3">
      <line x1="-131" y1="-83" x2="131" y2="-83"/>
      <line x1="-131" y1="83" x2="131" y2="83"/>
    </g>
    <!-- Glass highlight -->
    <rect x="-150" y="-100" width="300" height="200" rx="8" fill="url(#glass1)"/>
  </g>
  <!-- Sun glow top right -->
  <circle cx="330" cy="60" r="35" fill="#f97316" opacity="0.15"/>
  <circle cx="330" cy="60" r="20" fill="#f97316" opacity="0.25"/>
  <circle cx="330" cy="60" r="10" fill="#fbbf24" opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Helios Prime 450Вт</text>
</svg>
