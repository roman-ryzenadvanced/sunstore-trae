# ============================================================================
# SunStore v2 — Nginx Site Configuration
# ============================================================================
# Place: /etc/nginx/sites-available/sunstore
# Enable: ln -sf /etc/nginx/sites-available/sunstore /etc/nginx/sites-enabled/
# Reload: nginx -t && systemctl reload nginx
#
# Proxies port 80 → Next.js/Bun on localhost:3000
# ============================================================================

server {
    listen 80;
    server_name 167.233.19.201 _;

    # Max upload size (for product images, etc.)
    client_max_body_size 10M;

    # ── Main App Proxy ────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── API Routes — No Caching ────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Next.js Static Assets — Long Cache ─────────────────────────────
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;

        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
